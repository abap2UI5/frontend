# Keep the npm dependency tree and the GitHub Actions pinned versions
# up to date and covered by security alerts.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      abaplint:
        patterns:
          - "@abaplint/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
