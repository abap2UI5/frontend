name: build_branch

# Wiederverwendbarer Basis-Workflow: baut EINEN generierten Output-Branch
# aus main und pusht ihn als Commit oben auf die bestehende Branch-Historie
# (ohne inhaltliche Aenderung wird nichts gepusht). Der main-Commit wird als
# zweiter Parent mitgefuehrt, damit GitHub den Branch als "ahead" statt
# "behind" gegenueber main anzeigt. Aufgerufen von den vier
# build_<branch>-Workflows sowie von build_rename (umbenannte BSP-Varianten
# standard_<name> / standard_v2_<name>).

on:
  workflow_call:
    inputs:
      branch:
        description: "Output-Branch: cloud | cloud_v2 | standard | standard_v2 | standard_<name> | standard_v2_<name>"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      BRANCH: ${{ inputs.branch }}
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: 20
    - run: npm ci

    # ABAP-Check der Cloud-Artefakte (abap/cloud), wie bisher ABAP_CLOUD
    - run: npx abaplint

    - name: Build ${{ inputs.branch }}
      run: node .github/build-branches.mjs "$BRANCH"

    # ABAP-Check des generierten standard-Trees (BSP + On-Prem-Handler),
    # wie bisher ABAP_STANDARD; die abaplint.jsonc liegt jetzt im Output.
    # Gilt auch fuer umbenannte standard_<name>-Varianten (nicht fuer v2).
    - name: Lint generated standard src
      if: startsWith(inputs.branch, 'standard') && !startsWith(inputs.branch, 'standard_v2')
      run: (cd ".github/out/$BRANCH" && npx abaplint)

    - name: Push ${{ inputs.branch }}
      run: |
        b="$BRANCH"
        git config user.name 'github-actions[bot]'
        git config user.email 'github-actions[bot]@users.noreply.github.com'
        git fetch origin "$b" --depth 1 2>/dev/null || true
        parent=$(git rev-parse -q --verify "refs/remotes/origin/$b" || true)
        index="$RUNNER_TEMP/index-$b"
        rm -f "$index"
        (cd ".github/out/$b" && GIT_DIR="$GITHUB_WORKSPACE/.git" GIT_WORK_TREE=. GIT_INDEX_FILE="$index" git add -A)
        tree=$(GIT_INDEX_FILE="$index" git write-tree)
        if [ -n "$parent" ] && [ "$(git rev-parse "$parent^{tree}")" = "$tree" ]; then
          echo "$b: keine Aenderungen"
          exit 0
        fi
        commit=$(git commit-tree "$tree" ${parent:+-p "$parent"} -p "$GITHUB_SHA" -m "build: $b from $GITHUB_SHA")
        git push origin "$commit:refs/heads/$b"
        echo "$b: $commit gepusht"
