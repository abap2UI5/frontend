name: build_branches

# Baut aus main die vier generierten Output-Branches:
# cloud, cloud_v2, standard, standard_v2. Historie der Branches bleibt
# erhalten (jeder Lauf setzt einen Commit oben drauf); ohne inhaltliche
# Aenderung wird nichts gepusht.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_branches:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 20
    - run: npm ci

    # ABAP-Check der Cloud-Artefakte (src/), wie bisher ABAP_CLOUD
    - run: npx abaplint

    - name: Build output branches
      run: node .github/build-branches.mjs

    # ABAP-Check des generierten standard-Trees (BSP + On-Prem-Handler),
    # wie bisher ABAP_STANDARD auf dem standard-Branch
    - name: Lint generated standard src
      run: |
        cp abaplint.jsonc .github/out/standard/abaplint.jsonc
        (cd .github/out/standard && npx abaplint)
        rm .github/out/standard/abaplint.jsonc

    - name: Push output branches
      run: |
        git config user.name 'github-actions[bot]'
        git config user.email 'github-actions[bot]@users.noreply.github.com'
        for b in cloud cloud_v2 standard standard_v2; do
          git fetch origin "$b" --depth 1 2>/dev/null || true
          parent=$(git rev-parse -q --verify "refs/remotes/origin/$b" || true)
          index="$RUNNER_TEMP/index-$b"
          rm -f "$index"
          (cd ".github/out/$b" && GIT_DIR="$GITHUB_WORKSPACE/.git" GIT_WORK_TREE=. GIT_INDEX_FILE="$index" git add -A)
          tree=$(GIT_INDEX_FILE="$index" git write-tree)
          if [ -n "$parent" ] && [ "$(git rev-parse "$parent^{tree}")" = "$tree" ]; then
            echo "$b: keine Aenderungen"
            continue
          fi
          commit=$(git commit-tree "$tree" ${parent:+-p "$parent"} -m "build: $b from $GITHUB_SHA")
          git push origin "$commit:refs/heads/$b"
          echo "$b: $commit gepusht"
        done
