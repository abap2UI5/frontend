name: build_standard

on:
  push:
    branches: [main]
  workflow_dispatch:
  # monthly safety net in case a create_frontend push is lost
  schedule:
    - cron: '0 5 1 * *'

permissions:
  contents: write
  issues: write  # to report failed scheduled runs

concurrency:
  group: build_standard
  cancel-in-progress: false

jobs:
  build_standard:
    uses: ./.github/workflows/build_branch.yaml
    with:
      branch: standard
