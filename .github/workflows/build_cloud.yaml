name: build_cloud

on:
  push:
    branches: [main]
  workflow_dispatch:
  # monthly safety net in case a create_frontend push is lost
  schedule:
    - cron: '0 5 1 * *'

permissions:
  contents: write

concurrency:
  group: build_cloud
  cancel-in-progress: false

jobs:
  build_cloud:
    uses: ./.github/workflows/build_branch.yaml
    with:
      branch: cloud
